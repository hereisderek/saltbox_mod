---
################################
# Basics
################################
dockge_name: dockge

################################
# Paths
################################
dockge_role_paths_folder: "{{ dockge_name }}"
dockge_role_paths_location: "{{ server_appdata_path }}/{{ dockge_role_paths_folder }}"
dockge_role_paths_folders_list:
  - "{{ dockge_role_paths_location }}"
  - "{{ dockge_role_paths_location }}/data"
  - "{{ dockge_role_paths_location }}/stacks"

################################
# Web
################################
dockge_role_web_subdomain: "{{ dockge_name }}"
dockge_role_web_domain: "{{ user.domain }}"
dockge_role_web_port: "5001"
dockge_role_web_url: "{{ 'https://' + (lookup('role_var', '_web_subdomain', role='dockge') + '.' + lookup('role_var', '_web_domain', role='dockge') if (lookup('role_var', '_web_subdomain', role='dockge') | length > 0) else lookup('role_var', '_web_domain', role='dockge')) }}"

################################
# DNS
################################
dockge_role_dns_record: "{{ lookup('role_var', '_web_subdomain', role='dockge') }}"
dockge_role_dns_zone: "{{ lookup('role_var', '_web_domain', role='dockge') }}"
dockge_role_dns_proxy: "{{ dns_proxied }}"

################################
# Traefik (Reverse Proxy & Auth)
################################
dockge_role_traefik_sso_middleware: "{{ traefik_default_sso_middleware }}"
dockge_role_traefik_middleware_default: "{{ traefik_default_middleware }}"
dockge_role_traefik_middleware_custom: ""
dockge_role_traefik_certresolver: "{{ traefik_default_certresolver }}"
dockge_role_traefik_enabled: true
dockge_role_traefik_api_enabled: false
dockge_role_traefik_api_endpoint: ""

################################
# Docker
################################
dockge_role_docker_container: "{{ dockge_name }}"

# Image
dockge_role_docker_image_pull: true
dockge_role_docker_image_repo: "louislam/dockge"
dockge_role_docker_image_tag: "1"
dockge_role_docker_image: "{{ lookup('role_var', '_docker_image_repo', role='dockge') }}:{{ lookup('role_var', '_docker_image_tag', role='dockge') }}"

# Envs
dockge_role_docker_envs_default:
  PUID: "{{ uid }}"
  PGID: "{{ gid }}"
  TZ: "{{ tz }}"
  DOCKGE_DATA_DIR: "{{ dockge_role_paths_location }}/data"
  DOCKGE_STACKS_DIR: "{{ dockge_role_paths_location }}/stacks" # Must match exactly


dockge_role_docker_envs_custom: {}
dockge_role_docker_envs: "{{ lookup('role_var', '_docker_envs_default', role='dockge') | combine(lookup('role_var', '_docker_envs_custom', role='dockge')) }}"

# Volumes
dockge_role_docker_volumes_default:
  - "/var/run/docker.sock:/var/run/docker.sock"
  - "{{ dockge_role_paths_location }}/data:/app/data"
  - "{{ dockge_role_paths_location }}/stacks:{{ dockge_role_paths_location }}/stacks" # Host and container paths mirror each other

dockge_role_docker_volumes_custom: []
dockge_role_docker_volumes: "{{ lookup('role_var', '_docker_volumes_default', role='dockge') + lookup('role_var', '_docker_volumes_custom', role='dockge') }}"

# Ports
dockge_role_docker_ports_defaults: []
dockge_role_docker_ports_custom: []
dockge_role_docker_ports: "{{ lookup('role_var', '_docker_ports_defaults', role='dockge') + lookup('role_var', '_docker_ports_custom', role='dockge') }}"

# Network & Hostname
dockge_role_docker_hostname: "{{ dockge_name }}"
dockge_role_docker_networks_alias: "{{ dockge_name }}"
dockge_role_docker_networks_default: []
dockge_role_docker_networks_custom: []
dockge_role_docker_networks: "{{ docker_networks_common + lookup('role_var', '_docker_networks_default', role='dockge') + lookup('role_var', '_docker_networks_custom', role='dockge') }}"

# Operations
dockge_role_docker_restart_policy: unless-stopped
dockge_role_docker_state: started